<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calm Corner 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#FF9CCF;
  --muted:#6b6b6b;
  --panel-bg: rgba(255,255,255,0.15);
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition:none !important;}
}
html,body{height:100%;margin:0;font-family:'Comfortaa',system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;color:var(--muted);-webkit-font-smoothing:antialiased;}
.bg{position:fixed;inset:0;z-index:-1;background-image: url('cat.jpg');background-repeat:no-repeat;background-position:center center;background-size:cover;filter: blur(2px) brightness(0.95);transition: background-image 1.5s ease, filter 1.5s ease;}
.wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px;}
.panel{width:min(760px,92%); border-radius:20px; background:var(--panel-bg); box-shadow:0 8px 30px rgba(50,50,60,0.08); padding:34px; text-align:center; backdrop-filter:blur(6px) saturate(120%);}
h1{margin:0; font-size:clamp(1.6rem,3vw,2.6rem); letter-spacing:-0.02em; color:#3e3e4a; display:flex; align-items:center; justify-content:center; gap:10px;}
.subtitle{margin-top:8px; font-size:1rem; color:#59606a; opacity:.9;}
.breath-row{margin:28px auto 14px; display:flex; gap:18px; align-items:center; justify-content:center; flex-wrap:wrap;}
.breath{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:scale(1);animation:breatheScale 10s ease-in-out infinite;}
@keyframes breatheScale{0%{transform:scale(1);opacity:0.9;}40%{transform:scale(1.25);opacity:1;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:0.9;}}
#breathText{font-weight:600;color:#3c3c46;margin-top:6px;}
#breathSeconds{font-weight:500;color:#7a7a83;margin-top:2px;}
.controls{margin-top:18px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
.btn{background:white; border-radius:12px; padding:10px 14px; box-shadow:0 6px 18px rgba(70,70,90,0.06); border:none; cursor:pointer; font-weight:600; display:inline-flex; gap:8px; align-items:center; transition: transform .12s ease, box-shadow .12s ease;}
.btn:active{transform:translateY(1px);}
.btn.small{padding:8px 10px; font-size:.95rem;}
.btn.playing{background:linear-gradient(135deg,#ffd7e6,#ffd2f2); box-shadow:0 8px 20px rgba(255,160,200,0.18);}
select.track-selector{padding:6px 10px; border-radius:8px; border:1px solid #ccc; font-size:.95rem; cursor:pointer;}
.feature-row{display:flex;justify-content:center;gap:20px;margin-top:25px;flex-wrap:wrap;}
.feature{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;transition:transform .2s; font-size:.85rem; color:#3c3c46;}
.feature img{width:50px;height:50px;border-radius:50%;margin-bottom:5px;}
.feature:hover{transform:scale(1.1);}
.panel-section{margin-top:20px;text-align:left;}
.entry, .todo-item{display:flex;justify-content:space-between;align-items:center;margin:6px 0;}
input, textarea{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc;font-family:'Comfortaa';}
.meta{margin-top:20px;font-size:.9rem;color:#6d6d75;opacity:.9;}
@media(max-width:540px){.breath{width:120px;height:120px;}.breath img{width:100%;height:100%;border-radius:50%;}}
</style>
</head>
<body class="mood-on">
<div class="bg"></div>

<main class="wrap" role="main">
<section class="panel" aria-labelledby="title">
<h1 id="title">🌿 Take a deep breath</h1>
<div class="subtitle">A tiny calm corner to slow down — follow the circle and breathe with it.</div>

<!-- Breathing circle with inhale/hold/exhale images -->
<div class="breath-row" aria-hidden="false">
  <div class="breath" id="breathCircle">
    <img id="breathImg" src="inhale.png" alt="Breathing visual" style="width:100%; height:100%; border-radius:50%;">
  </div>
  <div>
    <div id="breathText" aria-live="polite">Breathe in</div>
    <div id="breathSeconds">(4s)</div>
    <div style="font-size:.9rem; margin-top:6px; color:#7a7a83;">(Follow the circle)</div>
  </div>
</div>

<!-- Controls -->
<div class="controls" role="toolbar" aria-label="Calm corner controls">
  <button class="btn small" id="toggleBreath">⏸ Pause</button>
  <button class="btn small" id="musicBtn">🔈 Play music</button>
  <select id="trackSelect" class="track-selector" aria-label="Choose a calming track">
    <option value="moonlight.mp3">Moonlight</option>
    <option value="Wildflowers.mp3">Wildflowers</option>
    <option value="Heart-Of-The-Ocean.mp3">Heart of the Ocean</option>
    <option value="Magical-Moments.mp3">Magical Moments</option>
  </select>
  <button class="btn small" id="moodBtn">✨ Mood light</button>
</div>

<!-- Feature icons -->
<div class="feature-row">
  <div class="feature" id="journalBtn"><img src="todo.jpg"><span>Journal</span></div>
  <div class="feature" id="selfcareBtn"><img src="selfcare.jpg"><span>Self-Care</span></div>
  <div class="feature" id="pomodoroBtn"><img src="pomodoro.jpg"><span>Pomodoro</span></div>
  <div class="feature" id="todoFeatureBtn"><img src="todo.jpg"><span>To-Do</span></div>
</div>

<!-- Panels for features -->
<div class="panel-section" id="journalPanel" style="display:none;">
  <h3>Journal</h3>
  <textarea id="journalInput" rows="3" placeholder="Write your thoughts..."></textarea>
  <button class="btn small" id="saveEntry">Save</button>
  <button class="btn small" id="clearJournal">Clear All</button>
  <div id="entries"></div>
</div>

<div class="panel-section" id="selfcarePanel" style="display:none;">
  <h3>Self-Care Tips</h3>
  <div id="selfcareTip">Drink a glass of water 💧</div>
  <button class="btn small" id="nextTip">Next Tip</button>
</div>

<div class="panel-section" id="pomodoroPanel" style="display:none;">
  <h3>Pomodoro Timer</h3>
  <div id="pomodoroTimer">25:00</div>
  <button class="btn small" id="startPom">Start</button>
  <button class="btn small" id="pausePom">Pause</button>
  <button class="btn small" id="resetPom">Reset</button>
</div>

<div class="panel-section" id="todoPanel" style="display:none;">
  <h3>To-Do List</h3>
  <input type="text" id="todoInput" placeholder="Add a task...">
  <button class="btn small" id="addTodo">Add</button>
  <div id="todoList"></div>
</div>

<div class="meta">Tip: Click a feature icon to open the panel.</div>

<audio id="bgAudio" loop preload="auto">
  <source src="moonlight.mp3" type="audio/mpeg">
  Your browser doesn't support audio.
</audio>
</section>
</main>

<script>
// --- Breathing ---
const inhaleTime = 4, holdTime = 2, exhaleTime = 4;
const breathText = document.getElementById('breathText');
const breathSeconds = document.getElementById('breathSeconds');
const breathImg = document.getElementById('breathImg');
const breathCircle = document.getElementById('breathCircle');
const toggleBreathBtn = document.getElementById('toggleBreath');

let breathing = true, breathTimer;

function startBreathingLoop(){
  let phase = "inhale";
  let timeLeft = inhaleTime;

  breathCircle.style.animationPlayState = 'running';
  toggleBreathBtn.textContent = '⏸ Pause';
  breathing = true;

  breathTimer = setInterval(()=>{
    // Update image and text based on phase
    if(phase === "inhale") { breathImg.src = "inhale.png"; breathText.textContent="Breathe in"; }
    else if(phase === "hold") { breathImg.src = "hold.png"; breathText.textContent="Hold"; }
    else { breathImg.src = "exhale.png"; breathText.textContent="Breathe out"; }

    breathSeconds.textContent = `(${timeLeft}s)`;

    timeLeft--;

    if(timeLeft < 0){
      if(phase === "inhale"){ phase="hold"; timeLeft = holdTime; }
      else if(phase==="hold"){ phase="exhale"; timeLeft=exhaleTime; }
      else { phase="inhale"; timeLeft=inhaleTime; }
    }
  },1000);
}

function stopBreathingLoop(){
  clearInterval(breathTimer);
  toggleBreathBtn.textContent='▶ Resume';
  breathing=false;
  breathCircle.style.animationPlayState='paused';
  breathText.textContent='Paused';
  breathSeconds.textContent='';
}

startBreathingLoop();
toggleBreathBtn.addEventListener('click',()=>breathing?stopBreathingLoop():startBreathingLoop());

// --- Music ---
const musicBtn=document.getElementById('musicBtn');
const trackSelect=document.getElementById('trackSelect');
const bgAudio=document.getElementById('bgAudio');
let musicPlaying=false;
musicBtn.addEventListener('click',async ()=>{
  if(!musicPlaying){try{await bgAudio.play();musicPlaying=true;musicBtn.classList.add('playing');musicBtn.textContent='🔊 Music on';}catch(e){alert('Click to allow music');}} 
  else {bgAudio.pause();musicPlaying=false;musicBtn.classList.remove('playing');musicBtn.textContent='🔈 Play music';}
});
trackSelect.addEventListener('change',()=>{const wasPlaying=musicPlaying; bgAudio.pause(); bgAudio.src=trackSelect.value; bgAudio.load(); if(wasPlaying) bgAudio.play();});

// --- Mood toggle ---
const moodBtn=document.getElementById('moodBtn');
moodBtn.addEventListener('click',()=>{
  const isMood=document.body.classList.toggle('mood-on');
  const bg=document.querySelector('.bg');
  bg.style.backgroundImage=isMood?"url('cat.jpg')":"url('girl.jpg')";
  moodBtn.textContent=isMood?'✨ Mood light':'🌫️ Calm';
});

// --- Feature panels ---
const journalBtn=document.getElementById('journalBtn'), selfcareBtn=document.getElementById('selfcareBtn'), pomodoroBtn=document.getElementById('pomodoroBtn'), todoFeatureBtn=document.getElementById('todoFeatureBtn');
const journalPanel=document.getElementById('journalPanel'), selfcarePanel=document.getElementById('selfcarePanel'), pomodoroPanel=document.getElementById('pomodoroPanel'), todoPanel=document.getElementById('todoPanel');

[journalBtn,selfcareBtn,pomodoroBtn,todoFeatureBtn].forEach(btn=>{
  btn.addEventListener('click',()=>{
    journalPanel.style.display='none'; selfcarePanel.style.display='none'; pomodoroPanel.style.display='none'; todoPanel.style.display='none';
  });
});
journalBtn.addEventListener('click',()=>journalPanel.style.display='block');
selfcareBtn.addEventListener('click',()=>selfcarePanel.style.display='block');
pomodoroBtn.addEventListener('click',()=>pomodoroPanel.style.display='block');
todoFeatureBtn.addEventListener('click',()=>todoPanel.style.display='block');

// --- Journal ---
const journalInput=document.getElementById('journalInput'), saveEntry=document.getElementById('saveEntry'), clearJournal=document.getElementById('clearJournal'), entries=document.getElementById('entries');
let journalData=JSON.parse(localStorage.getItem('journalData')||'[]');
function renderJournal(){entries.innerHTML='';journalData.forEach((text,i)=>{const div=document.createElement('div'); div.className='entry'; div.innerHTML=`<span>${text}</span> <button class="btn small" onclick="deleteEntry(${i})">Delete</button>`; entries.appendChild(div);});}
function deleteEntry(i){journalData.splice(i,1); localStorage.setItem('journalData',JSON.stringify(journalData)); renderJournal();}
saveEntry.addEventListener('click',()=>{if(journalInput.value.trim()!==''){journalData.push(journalInput.value.trim()); localStorage.setItem('journalData',JSON.stringify(journalData)); journalInput.value=''; renderJournal();}});
clearJournal.addEventListener('click',()=>{journalData=[]; localStorage.setItem('journalData','[]'); renderJournal();});
renderJournal();

// --- Self-care ---
const tips=['Drink a glass of water 💧','Take a short walk 🚶‍♂️','Stretch for 5 mins 🧘‍♀️','Write 3 things you are grateful for ✨','Listen to calm music 🎵'];
let currentTip=0;
const selfcareTip=document.getElementById('selfcareTip'), nextTip=document.getElementById('nextTip');
nextTip.addEventListener('click',()=>{currentTip=(currentTip+1)%tips.length; selfcareTip.textContent=tips[currentTip];});

// --- Pomodoro ---
let pomodoroTime=25*60, pomodoroInterval, pomRunning=false;
const pomTimer=document.getElementById('pomodoroTimer');
function updatePom(){let m=Math.floor(pomodoroTime/60), s=pomodoroTime%60; pomTimer.textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;}
document.getElementById('startPom').addEventListener('click',()=>{if(!pomRunning){pomodoroInterval=setInterval(()=>{if(pomodoroTime>0){pomodoroTime--;updatePom();}else{clearInterval(pomodoroInterval);pomRunning=false;}},1000);pomRunning=true;}});
document.getElementById('pausePom').addEventListener('click',()=>{clearInterval(pomodoroInterval);pomRunning=false;});
document.getElementById('resetPom').addEventListener('click',()=>{pomodoroTime=25*60;updatePom();clearInterval(pomodoroInterval);pomRunning=false;});
updatePom();

// --- To-Do ---
const todoInput=document.getElementById('todoInput'), addTodo=document.getElementById('addTodo'), todoList=document.getElementById('todoList');
let todos=JSON.parse(localStorage.getItem('todos')||'[]');
function renderTodos(){todoList.innerHTML=''; todos.forEach((t,i)=>{const div=document.createElement('div'); div.className='todo-item'; div.innerHTML=`<span>${t}</span> <button class="btn small" onclick="deleteTodo(${i})">Delete</button>`; todoList.appendChild(div);});}
function deleteTodo(i){todos.splice(i,1); localStorage.setItem('todos',JSON.stringify(todos)); renderTodos();}
addTodo.addEventListener('click',()=>{if(todoInput.value.trim()!==''){todos.push(todoInput.value.trim()); localStorage.setItem('todos',JSON.stringify(todos)); todoInput.value=''; renderTodos();}});
renderTodos();
</script>
</body>
</html>
