<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calm Corner 🌙</title>
<style>
:root{
  --accent: #FF9CCF;
  --muted: #6b6b6b;
  --panel-bg: rgba(255,255,255,0.6);
}

/* Respect reduced motion */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition:none !important;}
}

html,body{height:100%; margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; color:var(--muted); -webkit-font-smoothing:antialiased;}

/* Background layer */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  /* use explicit file names with extension so the images resolve correctly */
  background-image: url('cat.jpg');
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
  background-color: #eef6f8; /* subtle fallback color while image loads */
  filter: blur(2px) brightness(0.95);
  transition: background-image 1.5s ease, filter 1.5s ease, background-color 1.5s ease;
}

/* Gradient overlay */
.bg::before{
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(135deg, rgba(255,200,220,0.2), rgba(180,230,235,0.2));
  pointer-events:none;
  z-index:0;
  transition: background 1.5s ease;
}

/* Animated overlay for mood-on */
.mood-on .bg::before{
  animation: gradientShift 40s ease-in-out infinite;
  background-size:400% 400%;
}
@keyframes gradientShift{
  0% { background: linear-gradient(135deg, rgba(255,200,220,0.2), rgba(180,230,235,0.2)); }
  25%{ background: linear-gradient(135deg, rgba(180,230,235,0.2), rgba(255,220,180,0.2)); }
  50%{ background: linear-gradient(135deg, rgba(255,220,180,0.2), rgba(220,200,255,0.2)); }
  75%{ background: linear-gradient(135deg, rgba(220,200,255,0.2), rgba(255,200,220,0.2)); }
  100%{ background: linear-gradient(135deg, rgba(255,200,220,0.2), rgba(180,230,235,0.2)); }
}

/* Page center panel */
.wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px;}
.panel{width:min(760px,92%); border-radius:20px; background:var(--panel-bg); box-shadow:0 8px 30px rgba(50,50,60,0.08); padding:34px; text-align:center; backdrop-filter:blur(6px) saturate(120%);}
h1{margin:0; font-size:clamp(1.6rem,3vw,2.6rem); letter-spacing:-0.02em; color:#3e3e4a; display:flex; align-items:center; justify-content:center; gap:10px;}
.subtitle{margin-top:8px; font-size:1rem; color:#59606a; opacity:.9;}

/* Breathing circle */
.breath-row{margin:28px auto 14px; display:flex; gap:18px; align-items:center; justify-content:center; flex-wrap:wrap;}
.breath{width:150px; height:150px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0.7)); box-shadow:0 10px 30px rgba(80,60,80,0.08), inset 0 -8px 20px rgba(0,0,0,0.03); transform:scale(1); animation:breatheScale 10s ease-in-out infinite;}
@keyframes breatheScale{0%{transform:scale(1); opacity:0.9;}40%{transform:scale(1.25); opacity:1;}60%{transform:scale(1.15);}100%{transform:scale(1); opacity:0.9;}}
.breath .emoji{font-size:2.2rem;}
#breathText{font-weight:600; color:#3c3c46; margin-top:6px;}

/* Controls */
.controls{margin-top:18px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
.btn{background:white; border-radius:12px; padding:10px 14px; box-shadow:0 6px 18px rgba(70,70,90,0.06); border:none; cursor:pointer; font-weight:600; display:inline-flex; gap:8px; align-items:center; transition: transform .12s ease, box-shadow .12s ease;}
.btn:active{transform:translateY(1px);}
.btn.small{padding:8px 10px; font-size:.95rem;}
.btn.playing{background:linear-gradient(135deg,#ffd7e6,#ffd2f2); box-shadow:0 8px 20px rgba(255,160,200,0.18);}
select.track-selector{padding:6px 10px; border-radius:8px; border:1px solid #ccc; font-size:.95rem; cursor:pointer;}

/* Sparkles animation */
.sparkles{
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:0;
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><circle cx="5" cy="5" r="2" fill="white" opacity="0.2"/></svg>');
  background-repeat: repeat;
  animation: moveSparkles 60s linear infinite;
}
@keyframes moveSparkles{0%{background-position:0 0;}100%{background-position:1000px 1000px;}}

.meta{margin-top:20px; font-size:.9rem; color:#6d6d75; opacity:.9;}
@media(max-width:540px){.breath{width:120px;height:120px;}.breath .emoji{font-size:1.8rem;}}
</style>
</head>
<body class="mood-on">
<div class="bg" aria-hidden="true"></div>

<main class="wrap" role="main">
<section class="panel" aria-labelledby="title">
<h1 id="title">🌿 Take a deep breath</h1>
<div class="subtitle">A tiny calm corner to slow down — follow the circle and breathe with it.</div>

<div class="breath-row" aria-hidden="false">
  <div class="breath" id="breathCircle" aria-hidden="false"><div class="emoji">🕊️</div></div>
  <div>
    <div id="breathText" aria-live="polite">Breathe in</div>
    <div style="font-size:.9rem; margin-top:6px; color:#7a7a83;">(Follow the circle)</div>
  </div>
</div>

<div class="controls" role="toolbar" aria-label="Calm corner controls">
  <button class="btn small" id="toggleBreath" aria-pressed="false">⏸ Pause</button>
  <button class="btn small" id="musicBtn" aria-pressed="false">🔈 Play music</button>
  <select id="trackSelect" class="track-selector" aria-label="Choose a calming track">
    <option value="moonlight.mp3">Moonlight</option>
    <option value="Wildflowers.mp3">Wildflowers</option>
    <option value="Heart-Of-The-Ocean.mp3">Heart of the Ocean</option>
    <option value="Magical-Moments.mp3">Magical Moments</option>
  </select>
  <button class="btn small" id="moodBtn" aria-pressed="true">✨ Mood light</button>
</div>

<div class="sparkles"></div>
<div class="meta">Tip: Select a track and click "Play music" to enjoy your calming sounds.</div>

<audio id="bgAudio" loop preload="auto">
  <source src="moonlight.mp3" type="audio/mpeg">
  Your browser doesn't support audio.
</audio>
</section>
</main>

<script>
const inhale=4000, hold=2000, exhale=4000, cycle=inhale+hold+exhale;
const breathText=document.getElementById('breathText');
const breathCircle=document.getElementById('breathCircle');
const toggleBreathBtn=document.getElementById('toggleBreath');
const musicBtn=document.getElementById('musicBtn');
const moodBtn=document.getElementById('moodBtn');
const trackSelect=document.getElementById('trackSelect');
const bgAudio=document.getElementById('bgAudio');
const reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if(reduced){breathText.textContent="Take a quiet moment"; breathCircle.style.animation='none';}

let breathing=true, breathTimer;
function updatePhaseText(){breathText.textContent="Breathe in"; setTimeout(()=>breathText.textContent="Hold",inhale); setTimeout(()=>breathText.textContent="Breathe out",inhale+hold);}
function startBreathingLoop(){updatePhaseText(); breathTimer=setInterval(updatePhaseText,cycle); toggleBreathBtn.textContent='⏸ Pause'; toggleBreathBtn.setAttribute('aria-pressed','false'); breathing=true; breathCircle.style.animationPlayState='running';}
function stopBreathingLoop(){clearInterval(breathTimer); toggleBreathBtn.textContent='▶ Resume'; toggleBreathBtn.setAttribute('aria-pressed','true'); breathing=false; breathCircle.style.animationPlayState='paused'; breathText.textContent='Paused';}
if(!reduced) startBreathingLoop(); else toggleBreathBtn.style.display='none';
toggleBreathBtn.addEventListener('click',()=>breathing?stopBreathingLoop():startBreathingLoop());

let musicPlaying=false;
musicBtn.addEventListener('click', async ()=>{
  if(!musicPlaying){
    try{await bgAudio.play(); musicPlaying=true; musicBtn.classList.add('playing'); musicBtn.textContent='🔊 Music on'; musicBtn.setAttribute('aria-pressed','true');}
    catch(e){alert('Click the button to allow music to play.'); console.warn(e);}
  } else {bgAudio.pause(); musicPlaying=false; musicBtn.classList.remove('playing'); musicBtn.textContent='🔈 Play music'; musicBtn.setAttribute('aria-pressed','false');}
});

trackSelect.addEventListener('change', ()=>{
  const wasPlaying=musicPlaying;
  bgAudio.pause();
  bgAudio.src=trackSelect.value;
  bgAudio.load();
  if(wasPlaying) bgAudio.play();
});

// Mood / Calm toggle with image change
moodBtn.addEventListener('click', ()=>{
  const isMood = document.body.classList.toggle('mood-on');
  document.body.classList.toggle('calm', !isMood);
  moodBtn.textContent = isMood ? '✨ Mood light' : '🌫️ Calm';

  // Change background image (use explicit filenames)
  const bg = document.querySelector('.bg');
  bg.style.backgroundImage = isMood 
    ? "url('cat.jpg')"   // Mood image
    : "url('girl.jpg')"; // Calm image
});

document.addEventListener('keydown',e=>{if(e.code==='Space'&&document.activeElement.tagName!=='BUTTON'){e.preventDefault(); toggleBreathBtn.click();}});
</script>
</body>
</html>
