<!doctype html>
<html lang="en">
<head>
<meta charset="utf- />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calm Corner 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#FF9CCF;
  /* stronger dark color for high contrast */
  --muted:#0f1113; /* near-black for readable text */
  /* remove white layover by making panel background transparent */
  --panel-bg: transparent;
}
html,body{
  height:100%;margin:0;
  font-family:'Comfortaa',system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  color:var(--muted);
  /* let the .bg element show through — no solid page background */
  background: transparent;
}
.bg{
  position:fixed;inset:0;z-index:-1;
  background:url('cat.jpg') center/cover no-repeat;
  filter:blur(2px) brightness(0.9);
  transition:background-image 1.5s ease;
}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;}
.panel{
  width:min(780px,94%);
  border-radius:20px;
  /* transparent panel so background image is visible without white overlay */
  background: var(--panel-bg);
  backdrop-filter: blur(6px) saturate(120%);
  box-shadow: 0 8px 30px rgba(50,50,60,0.08);
  padding:34px;
  text-align:center;
}
h1{margin:0;font-size:clamp(1.6rem,3vw,2.6rem);color:#0b0c0d;}
.subtitle{margin-top:8px;font-size:1rem;color:#2b2d30;}
.breath-row{margin:28px auto;display:flex;gap:20px;align-items:center;justify-content:center;flex-wrap:wrap;}
.breath{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.breath img{width:100%;height:100%;border-radius:50%;transition:transform 4s ease-in-out;}
.controls{margin-top:18px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{
  background:white;border-radius:12px;padding:10px 14px;
  box-shadow:0 6px 18px rgba(70,70,90,0.06);
  border:none;cursor:pointer;font-weight:600;
  transition:transform .12s, box-shadow .12s;
}
.btn:active{transform:translateY(1px);}
.feature-row{display:flex;justify-content:center;gap:18px;margin-top:25px;flex-wrap:wrap;}
.feature{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;font-size:.85rem;color:#1f2124;}
.feature img{width:50px;height:50px;border-radius:50%;margin-bottom:5px;}
.feature:hover{transform:scale(1.1);}
.panel-section{margin-top:25px;text-align:left;display:none;}
.entry,.todo-item{display:flex;justify-content:space-between;align-items:center;margin:6px 0;}
input,textarea{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc;font-family:'Comfortaa';color:var(--muted)}
.meta{margin-top:20px;font-size:.9rem;color:var(--muted);opacity:1}
small, .subtitle, .breath-row small{color:#26272b}
.btn{color:var(--muted)}

/* placeholder color (slightly lighter than main text but readable) */
input::placeholder, textarea::placeholder{color:#6b6b6b}
</style>
</head>
<body>
<div class="bg"></div>
<main class="wrap">
<section class="panel">
<h1>🌿 Take a deep breath</h1>
<div class="subtitle">Follow the rhythm — relax your body and mind.</div>

<!-- Breathing Circle -->
<div class="breath-row">
  <div class="breath"><img id="breathImg" src="inhale.png" alt="breath"></div>
  <div>
    <div id="breathText">Breathe in</div>
    <div id="phaseTimer" aria-live="polite" style="font-weight:600; margin-top:6px;">4s</div>
  </div>
</div>

<!-- Calm Music -->
<div class="controls">
  <button class="btn" id="toggleBreath">⏸ Pause</button>
  <button class="btn" id="musicBtn">🔈 Play Calm Music</button>
  <select id="trackSelect">
    <option value="moonlight.mp3">Moonlight</option>
    <option value="Wildflowers.mp3">Wildflowers</option>
    <option value="Heart-Of-The-Ocean.mp3">Heart of the Ocean</option>
    <option value="Magical-Moments.mp3">Magical Moments</option>
  </select>
  <button class="btn" id="moodBtn">✨ Mood Light</button>
</div>

<!-- Feature Icons -->
<div class="feature-row">
  <div class="feature" id="journalBtn"><img src="todo.jpg"><span>Journal</span></div>
  <div class="feature" id="selfcareBtn"><img src="selfcare.jpg"><span>Self-Care</span></div>
  <div class="feature" id="pomodoroBtn"><img src="pomodoro.jpg"><span>Pomodoro</span></div>
  <div class="feature" id="todoBtn"><img src="todo.jpg"><span>To-Do</span></div>
</div>

<!-- Panels -->
<div class="panel-section" id="journalPanel">
  <h3>Journal</h3>
  <textarea id="journalInput" rows="3" placeholder="Write your thoughts..."></textarea>
  <button class="btn" id="saveEntry">Save</button>
  <button class="btn" id="clearJournal">Clear All</button>
  <div id="entries"></div>
</div>

<div class="panel-section" id="selfcarePanel">
  <h3>Self-Care Tips</h3>
  <div id="selfcareTip">Drink water 💧</div>
  <button class="btn" id="nextTip">Next</button>
</div>

<div class="panel-section" id="pomodoroPanel">
  <h3>Pomodoro Timer</h3>
  <div id="pomodoroTimer">25:00</div>
  <select id="pomLength">
    <option value="25">25 min</option>
    <option value="50">50-10</option>
    <option value="90">90-15</option>
  </select>
  <button class="btn" id="startPom">Start</button>
  <button class="btn" id="pausePom">Pause</button>
  <button class="btn" id="resetPom">Reset</button>

  <!-- Focus Music -->
  <div style="margin-top:15px;">
    <h4>🎧 Focus Music</h4>
    <button class="btn" id="focusMusicBtn">Play Focus Music</button>
    <select id="focusTrackSelect">
      <option value="Rain.mp3">Rain</option>
      <option value="Piano.mp3">Piano</option>
      <option value="Forest.mp3">Forest</option>
    </select>
  </div>
</div>

<div class="panel-section" id="todoPanel">
  <h3>To-Do List</h3>
  <input id="todoInput" placeholder="Add a task...">
  <button class="btn" id="addTodo">Add</button>
  <div id="todoList"></div>
</div>

<audio id="bgAudio" loop></audio>
<audio id="focusAudio" loop></audio>

<div class="meta">✨ You can open multiple panels & play both musics together!</div>
</section>
</main>

<script>
// --- Breathing ---
const inhale=4,hold=7,exhale=8,cycle=(inhale+hold+exhale)*1000;
const breathImg=document.getElementById('breathImg');
const breathText=document.getElementById('breathText');
let breathing=true,breathTimer,phaseInterval,phaseRemaining;
let holdTimeoutId=null, exhaleTimeoutId=null;
const phaseTimerEl = document.getElementById('phaseTimer');

function setPhase(name, durationSec, imgSrc, scale, animate = true){
  // set text and image
  breathText.textContent = name;
  if(imgSrc) breathImg.src = imgSrc;

  // control whether transform changes should animate
  if(animate){
    // animate transform over the phase duration
    breathImg.style.transition = `transform ${durationSec}s ease-in-out`;
    // apply transform and let it animate
    requestAnimationFrame(()=>{ breathImg.style.transform = scale; });
  } else {
    // immediate - snap to transform without animating
    // first ensure any pending transition finishes
    breathImg.style.transition = '';
    // force reflow so the transition removal takes effect
    void breathImg.offsetWidth;
    breathImg.style.transition = 'none';
    breathImg.style.transform = scale;
  }

  // start per-second countdown
  clearInterval(phaseInterval);
  phaseRemaining = durationSec;
  phaseTimerEl.textContent = `${phaseRemaining}s`;
  phaseInterval = setInterval(()=>{
    phaseRemaining--;
    if(phaseRemaining <= 0){
      clearInterval(phaseInterval);
      phaseTimerEl.textContent = `0s`;
    } else {
      phaseTimerEl.textContent = `${phaseRemaining}s`;
    }
  }, 1000);
}

function breatheCycle(){
  // inhale (animate)
  setPhase('Breathe in', inhale, 'inhale.png', 'scale(1.25)', true);

  // hold (no animation - keep still)
  holdTimeoutId = setTimeout(()=>{
    holdTimeoutId = null;
    setPhase('Hold', hold, 'hold.png', 'scale(1.25)', false);
  }, inhale*1000);

  // exhale (animate)
  exhaleTimeoutId = setTimeout(()=>{
    exhaleTimeoutId = null;
    setPhase('Breathe out', exhale, 'exhale.png', 'scale(1)', true);
  }, (inhale+hold)*1000);
}

function startBreath(){
  // clear any leftover timeouts/intervals
  if(holdTimeoutId){ clearTimeout(holdTimeoutId); holdTimeoutId = null; }
  if(exhaleTimeoutId){ clearTimeout(exhaleTimeoutId); exhaleTimeoutId = null; }
  if(phaseInterval){ clearInterval(phaseInterval); phaseInterval = null; }

  // ensure transitions are enabled for upcoming phases
  breathImg.style.transition = '';

  breatheCycle();
  breathTimer = setInterval(breatheCycle, cycle);
  document.getElementById('toggleBreath').textContent = '⏸ Pause';
  breathing = true;
}

function stopBreath(){
  // stop the repeating cycle
  clearInterval(breathTimer);
  // clear per-second countdown
  if(phaseInterval){ clearInterval(phaseInterval); phaseInterval = null; }
  // clear scheduled phase timeouts (hold/exhale)
  if(holdTimeoutId){ clearTimeout(holdTimeoutId); holdTimeoutId = null; }
  if(exhaleTimeoutId){ clearTimeout(exhaleTimeoutId); exhaleTimeoutId = null; }

  // freeze current transform: capture computed transform and remove transitions
  try{
    const computed = getComputedStyle(breathImg).transform;
    // disable transition then set to computed transform to 'freeze' state
    breathImg.style.transition = 'none';
    breathImg.style.transform = computed === 'none' ? 'scale(1)' : computed;
  }catch(e){/* ignore */}

  breathing = false;
  document.getElementById('toggleBreath').textContent = '▶ Resume';
}

startBreath();
document.getElementById('toggleBreath').onclick = ()=> breathing ? stopBreath() : startBreath();

// --- Calm Music ---
const bgAudio=document.getElementById('bgAudio');
const musicBtn=document.getElementById('musicBtn');
const trackSelect=document.getElementById('trackSelect');
let calmOn=false;
musicBtn.onclick=async()=>{
  if(!calmOn){bgAudio.src=trackSelect.value;await bgAudio.play();calmOn=true;musicBtn.textContent='🔊 Music On';}
  else{bgAudio.pause();calmOn=false;musicBtn.textContent='🔈 Play Calm Music';}
};
trackSelect.onchange=()=>{bgAudio.src=trackSelect.value;if(calmOn)bgAudio.play();};

// --- Focus Music ---
const focusAudio=document.getElementById('focusAudio');
const focusBtn=document.getElementById('focusMusicBtn');
const focusSelect=document.getElementById('focusTrackSelect');
let focusOn=false;
focusBtn.onclick=async()=>{
  if(!focusOn){focusAudio.src=focusSelect.value;await focusAudio.play();focusOn=true;focusBtn.textContent='🔊 Focus Music On';}
  else{focusAudio.pause();focusOn=false;focusBtn.textContent='🎧 Play Focus Music';}
};
focusSelect.onchange=()=>{focusAudio.src=focusSelect.value;if(focusOn)focusAudio.play();};

// --- Mood switch ---
document.getElementById('moodBtn').onclick=()=>{
  const bg=document.querySelector('.bg');
  bg.style.backgroundImage=bg.style.backgroundImage.includes('cat.jpg')?"url('girl.jpg')":"url('cat.jpg')";
};

// --- Journal ---
const journalPanel=document.getElementById('journalPanel');
document.getElementById('journalBtn').onclick=()=>journalPanel.style.display=journalPanel.style.display==='block'?'none':'block';
const journalInput=document.getElementById('journalInput');
let journalData=JSON.parse(localStorage.getItem('journalData')||'[]');
const entries=document.getElementById('entries');
function renderJournal(){
  entries.innerHTML='';
  journalData.forEach((t,i)=>{
    entries.innerHTML+=`<div class='entry'><span>${t}</span><button class='btn' onclick='deleteEntry(${i})'>Delete</button></div>`;
  });
}
function deleteEntry(i){journalData.splice(i,1);localStorage.setItem('journalData',JSON.stringify(journalData));renderJournal();}
document.getElementById('saveEntry').onclick=()=>{
  if(journalInput.value.trim()!==''){journalData.push(journalInput.value.trim());localStorage.setItem('journalData',JSON.stringify(journalData));journalInput.value='';renderJournal();}
};
document.getElementById('clearJournal').onclick=()=>{journalData=[];localStorage.setItem('journalData','[]');renderJournal();}
renderJournal();

// --- Self-care ---
const tips=['Drink water 💧','Stretch 🧘‍♀️','Walk for 2 mins 🚶‍♀️','Deep breath ✨','Smile 😊'];
let tipIndex=0;
document.getElementById('nextTip').onclick=()=>{
  tipIndex=(tipIndex+1)%tips.length;
  document.getElementById('selfcareTip').textContent=tips[tipIndex];
};
document.getElementById('selfcareBtn').onclick=()=>{
  const el=document.getElementById('selfcarePanel');
  el.style.display=el.style.display==='block'?'none':'block';
};

// --- Pomodoro ---
const pomTimer=document.getElementById('pomodoroTimer');
let pomTime=25*60,pomRunning=false,pomInterval;
function updatePom(){
  const m=Math.floor(pomTime/60),s=pomTime%60;
  pomTimer.textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}
document.getElementById('pomodoroBtn').onclick=()=>{
  const el=document.getElementById('pomodoroPanel');
  el.style.display=el.style.display==='block'?'none':'block';
};
document.getElementById('pomLength').onchange=(e)=>{
  const val=parseInt(e.target.value);
  pomTime=val*60;
  updatePom();
};
document.getElementById('startPom').onclick=()=>{
  if(!pomRunning){
    pomRunning=true;
    pomInterval=setInterval(()=>{
      if(pomTime>0){pomTime--;updatePom();}
      else{clearInterval(pomInterval);pomRunning=false;}
    },1000);
  }
};
document.getElementById('pausePom').onclick=()=>{clearInterval(pomInterval);pomRunning=false;};
document.getElementById('resetPom').onclick=()=>{clearInterval(pomInterval);pomRunning=false;pomTime=parseInt(document.getElementById('pomLength').value)*60;updatePom();};
updatePom();

// --- To-Do ---
const todoPanel=document.getElementById('todoPanel');
document.getElementById('todoBtn').onclick=()=>todoPanel.style.display=todoPanel.style.display==='block'?'none':'block';
let todos=JSON.parse(localStorage.getItem('todos')||'[]');
const todoList=document.getElementById('todoList');
function renderTodos(){
  todoList.innerHTML='';
  todos.forEach((t,i)=>{
    todoList.innerHTML+=`<div class='todo-item'><span>${t}</span><button class='btn' onclick='deleteTodo(${i})'>Delete</button></div>`;
  });
}
function deleteTodo(i){todos.splice(i,1);localStorage.setItem('todos',JSON.stringify(todos));renderTodos();}
document.getElementById('addTodo').onclick=()=>{
  const val=document.getElementById('todoInput').value.trim();
  if(val!==''){todos.push(val);localStorage.setItem('todos',JSON.stringify(todos));document.getElementById('todoInput').value='';renderTodos();}
};
renderTodos();
</script>
</body>
</html>
